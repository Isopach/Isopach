<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated Isopach avatar</title>
  <desc id="desc">A vector version of the Isopach kaomoji avatar with a red and black striped hat, animated with blinking eyes and a gentle hat bob.</desc>
  <style>
    :root {
      color-scheme: dark;
    }

    .bg {
      fill: #0d1117;
    }

    .grid {
      stroke: #263244;
      stroke-width: 1;
      opacity: 0.32;
    }

    .avatar {
      animation: float 4.6s ease-in-out infinite;
      transform-origin: 348px 225px;
    }

    .hat {
      animation: hat-bob 3.8s ease-in-out infinite;
      transform-origin: 344px 150px;
    }

    .stripe-highlight {
      stroke-dasharray: 76 450;
      animation: stripe-slide 7s linear infinite;
      opacity: 0.32;
    }

    .face-shadow {
      fill: #000;
      opacity: 0.22;
      filter: blur(18px);
      animation: shadow-pulse 4.6s ease-in-out infinite;
      transform-origin: 342px 356px;
    }

    .eye {
      animation: blink 5.4s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .eye.right {
      animation-delay: 0.08s;
    }

    .brow {
      animation: brow 5.4s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .mouth {
      stroke-dasharray: 240;
      stroke-dashoffset: 240;
      animation: draw-mouth 1.3s ease-out 0.25s forwards, mouth-bob 4.6s ease-in-out 1.6s infinite;
      transform-origin: 344px 287px;
    }

    .spark {
      fill: #f7d774;
      animation: spark 2.8s ease-in-out infinite;
    }

    .spark.s2 {
      animation-delay: 0.7s;
    }

    .spark.s3 {
      animation-delay: 1.4s;
    }

    .title {
      fill: #f0f6fc;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 72px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .subtitle {
      fill: #8b949e;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 22px;
      letter-spacing: 0;
    }

    .cursor {
      fill: #f7d774;
      animation: cursor 1.1s steps(1, end) infinite;
    }

    .rule {
      stroke: url(#ruleGradient);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 130 620;
      animation: rule 6.4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-9px);
      }
    }

    @keyframes hat-bob {
      0%, 100% {
        transform: rotate(0deg) translateY(0);
      }
      45% {
        transform: rotate(-1.8deg) translateY(-6px);
      }
      70% {
        transform: rotate(1.1deg) translateY(-2px);
      }
    }

    @keyframes stripe-slide {
      to {
        stroke-dashoffset: -526;
      }
    }

    @keyframes shadow-pulse {
      0%, 100% {
        transform: scaleX(1);
        opacity: 0.2;
      }
      50% {
        transform: scaleX(0.9);
        opacity: 0.14;
      }
    }

    @keyframes blink {
      0%, 92%, 100% {
        transform: scaleY(1);
      }
      95% {
        transform: scaleY(0.08);
      }
    }

    @keyframes brow {
      0%, 92%, 100% {
        transform: translateY(0);
      }
      95% {
        transform: translateY(3px);
      }
    }

    @keyframes draw-mouth {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes mouth-bob {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(2px);
      }
    }

    @keyframes spark {
      0%, 100% {
        opacity: 0.15;
        transform: scale(0.8);
      }
      50% {
        opacity: 0.95;
        transform: scale(1.1);
      }
    }

    @keyframes cursor {
      0%, 48% {
        opacity: 1;
      }
      49%, 100% {
        opacity: 0;
      }
    }

    @keyframes rule {
      0%, 100% {
        stroke-dashoffset: 0;
      }
      50% {
        stroke-dashoffset: -460;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .avatar,
      .hat,
      .stripe-highlight,
      .face-shadow,
      .eye,
      .brow,
      .mouth,
      .spark,
      .cursor,
      .rule {
        animation: none;
      }

      .mouth {
        stroke-dashoffset: 0;
      }
    }
  </style>

  <defs>
    <linearGradient id="faceGradient" x1="196" y1="177" x2="502" y2="361" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff7dc"/>
      <stop offset="0.55" stop-color="#f6e4b9"/>
      <stop offset="1" stop-color="#d7bf87"/>
    </linearGradient>
    <linearGradient id="redGradient" x1="210" y1="39" x2="463" y2="212" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d83a30"/>
      <stop offset="0.55" stop-color="#b92326"/>
      <stop offset="1" stop-color="#7c1419"/>
    </linearGradient>
    <linearGradient id="blackGradient" x1="224" y1="35" x2="477" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#151820"/>
      <stop offset="1" stop-color="#05070a"/>
    </linearGradient>
    <linearGradient id="ruleGradient" x1="610" y1="272" x2="1115" y2="272" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2f81f7"/>
      <stop offset="0.52" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#f7d774"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(325 202) rotate(61) scale(300 450)">
      <stop stop-color="#7c3aed" stop-opacity="0.24"/>
      <stop offset="0.42" stop-color="#2f81f7" stop-opacity="0.11"/>
      <stop offset="1" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="bannerClip">
      <rect width="1200" height="420" rx="24"/>
    </clipPath>
    <clipPath id="hatClip">
      <path d="M226 206C225 166 238 129 265 99C287 74 309 51 327 15C333 2 352 1 359 14C373 39 400 58 424 82C451 109 472 147 477 201C478 215 469 228 455 230C374 244 310 243 239 224C231 222 226 215 226 206Z"/>
    </clipPath>
  </defs>

  <g clip-path="url(#bannerClip)">
    <rect class="bg" width="1200" height="420" rx="24"/>
    <rect width="1200" height="420" fill="url(#bgGlow)"/>

    <g>
      <path class="grid" d="M80 0V420"/>
      <path class="grid" d="M160 0V420"/>
      <path class="grid" d="M240 0V420"/>
      <path class="grid" d="M320 0V420"/>
      <path class="grid" d="M400 0V420"/>
      <path class="grid" d="M480 0V420"/>
      <path class="grid" d="M560 0V420"/>
      <path class="grid" d="M640 0V420"/>
      <path class="grid" d="M720 0V420"/>
      <path class="grid" d="M800 0V420"/>
      <path class="grid" d="M880 0V420"/>
      <path class="grid" d="M960 0V420"/>
      <path class="grid" d="M1040 0V420"/>
      <path class="grid" d="M1120 0V420"/>
      <path class="grid" d="M0 84H1200"/>
      <path class="grid" d="M0 168H1200"/>
      <path class="grid" d="M0 252H1200"/>
      <path class="grid" d="M0 336H1200"/>
    </g>

    <ellipse class="face-shadow" cx="342" cy="356" rx="178" ry="28"/>

    <g class="avatar">
      <path d="M152 326C114 301 82 302 52 320C38 329 25 307 38 295C75 260 123 258 170 287L152 326Z" fill="#9b6f4a"/>
      <path d="M535 327C575 303 607 304 637 323C650 332 665 311 652 298C615 262 567 260 519 288L535 327Z" fill="#8c6647"/>

      <path d="M177 237C178 182 213 153 262 154H422C472 154 509 185 511 237L514 270C519 342 466 384 394 388H293C220 384 169 342 174 270L177 237Z" fill="url(#faceGradient)"/>
      <path d="M179 238C178 187 216 157 263 157H421C469 157 505 187 507 237L510 264C455 240 384 230 308 237C252 242 209 256 174 277L179 238Z" fill="#fff5d2" opacity="0.44"/>

      <g class="hat">
        <g clip-path="url(#hatClip)">
          <rect x="210" y="-4" width="296" height="244" fill="url(#redGradient)"/>
          <path d="M224 29C281 51 351 55 427 43L448 87C363 102 293 93 236 69L224 29Z" fill="url(#blackGradient)"/>
          <path d="M205 110C279 136 373 146 470 128L483 174C379 195 287 182 213 155L205 110Z" fill="url(#blackGradient)"/>
          <path d="M217 197C290 221 376 225 481 202L489 241C391 263 291 261 211 232L217 197Z" fill="url(#blackGradient)"/>
          <path d="M324 0C336 71 341 144 334 232" stroke="#05070a" stroke-opacity="0.35" stroke-width="5"/>
          <path d="M365 8C360 75 363 145 377 228" stroke="#05070a" stroke-opacity="0.28" stroke-width="4"/>
          <path class="stripe-highlight" d="M222 70C290 97 363 103 451 86M211 155C288 183 376 193 481 172M218 231C304 258 394 258 489 239" stroke="#ff7567" stroke-width="7" stroke-linecap="round"/>
        </g>
        <path d="M226 206C225 166 238 129 265 99C287 74 309 51 327 15C333 2 352 1 359 14C373 39 400 58 424 82C451 109 472 147 477 201C478 215 469 228 455 230C374 244 310 243 239 224C231 222 226 215 226 206Z" stroke="#05070a" stroke-opacity="0.28" stroke-width="7"/>
      </g>

      <path class="brow" d="M229 254L260 244" stroke="#080b10" stroke-width="10" stroke-linecap="round"/>
      <path class="brow" d="M428 244L459 254" stroke="#080b10" stroke-width="10" stroke-linecap="round"/>

      <ellipse class="eye left" cx="278" cy="302" rx="17" ry="22" fill="#080b10"/>
      <ellipse class="eye right" cx="410" cy="302" rx="17" ry="22" fill="#080b10"/>

      <path class="mouth" d="M324 295C305 300 299 333 319 342C334 349 344 331 344 316C344 331 354 349 369 342C389 333 383 300 364 295" stroke="#080b10" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M242 342C264 362 297 373 341 373C387 373 425 361 448 341" stroke="#c7a56d" stroke-width="5" stroke-linecap="round" opacity="0.24"/>
    </g>

    <circle class="spark s1" cx="150" cy="126" r="4"/>
    <circle class="spark s2" cx="525" cy="98" r="3.6"/>
    <circle class="spark s3" cx="567" cy="280" r="4.4"/>

    <g transform="translate(610 134)">
      <text class="title" x="0" y="70">Isopach</text>
      <rect class="cursor" x="351" y="14" width="14" height="64" rx="2"/>
      <text class="subtitle" x="3" y="126">security research / CTF writeups / tools</text>
      <path class="rule" d="M4 178H504"/>
    </g>
  </g>
</svg>
